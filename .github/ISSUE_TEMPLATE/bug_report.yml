name: Bug Report
description: Report a bug in younggeul
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `younggeul simulate ...`
        2. Observe error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: younggeul version (run `younggeul --version`)
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Data Pipeline (Bronze/Silver/Gold)
        - Simulation Runtime
        - Report/Evidence Pipeline
        - Evaluation/Benchmark
        - CLI
        - Web UI
        - Other
    validations:
      required: true
