name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Data Pipeline
        - Simulation Runtime
        - Report/Evidence Pipeline
        - Evaluation/Benchmark
        - CLI
        - Web UI
        - Core Platform
        - Other
    validations:
      required: true
