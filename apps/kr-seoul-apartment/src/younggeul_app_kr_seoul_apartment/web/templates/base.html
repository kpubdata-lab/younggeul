<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}영끌 시뮬레이터{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0 auto;
      max-width: 960px;
      padding: 24px 20px 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    h1, h2, h3 { margin-top: 0; }

    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }

    nav a {
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
    }

    nav a:hover {
      background: var(--primary-soft);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    .muted { color: var(--muted); }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-running { background: #dbeafe; color: #1d4ed8; }
    .badge-completed { background: #dcfce7; color: #166534; }
    .badge-failed { background: #fee2e2; color: #991b1b; }

    form { display: grid; gap: 12px; }

    label {
      display: block;
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, textarea, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea { min-height: 110px; }

    button {
      width: auto;
      min-width: 120px;
      cursor: pointer;
      border-color: #1d4ed8;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      text-align: left;
      vertical-align: top;
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    code, pre {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #f8fafc;
    }

    pre {
      padding: 12px;
      overflow-x: auto;
      margin: 0;
      white-space: pre-wrap;
    }

    .error {
      border: 1px solid #fecaca;
      color: #991b1b;
      background: #fef2f2;
      border-radius: 10px;
      padding: 10px 12px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/ui/dashboard">Dashboard</a>
    <a href="/ui/simulate">Simulate</a>
    <a href="/ui/baseline">Baseline</a>
  </nav>

  {% block content %}{% endblock %}
</body>
</html>
